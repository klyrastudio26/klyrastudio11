<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Klyra Studio</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>KLYRA STUDIO</h1>
                <p>User Login</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="phone">Enter your number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your mobile number" required>
                    <small>We'll use this for order updates and communication</small>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="user-signup.html">Sign Up</a></p>
                <p><a href="../index.html">Back to Home</a></p>
                <p style="margin-top: 20px; font-size: 12px; color: #999;">
                    Admin? <a href="admin-login.html" style="color: #d4af37;">Admin Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/user-auth.js"></script>
</body>
</html>
