    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://ornaknccgxnoegcuptzi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ybmFrbmNjZ3hub2VnY3VwdHppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjY1NTcsImV4cCI6MjA5MzMwMjU1N30.Wy19Iwm-tdcApEpMBt1IEn6XWSe9-FvPpZI03feV9DA';

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="../assets/klyra-logo.svg" alt="Klyra Studio Logo" class="brand-logo">
                <h1>KLYRA STUDIO</h1>
                <p>Create Account</p>
            </div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-phone">Mobile Number</label>
                    <input type="tel" id="signup-phone" name="phone" placeholder="Enter your 10-digit mobile number" required>
                    <small>We'll use this to send you order updates</small>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Create a strong password" required>
                    <small>Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" name="confirm-password" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-login">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="user-login.html">Sign In</a></p>
                <p><a href="../index.html">Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/checkout.js"></script>
</body>
