<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Sign Up - Klyra Studio</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>KLYRA STUDIO</h1>
                <p>Create Account</p>
            </div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-phone">Mobile Number</label>
                    <input type="tel" id="signup-phone" name="phone" placeholder="Enter your 10-digit mobile number" required>
                    <small>We'll use this to send you order updates</small>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Create a strong password" required>
                    <small>Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" name="confirm-password" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-login">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="user-login.html">Sign In</a></p>
                <p><a href="../index.html">Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/checkout.js"></script>
</body>
</html>
