<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Klyra Studio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .product-details-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .product-image-section {
            position: sticky;
            top: 100px;
        }

        .product-image-section img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .product-info-section h1 {
            font-size: 2.5em;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }

        .product-collection {
            color: #d4af37;
            font-size: 1.1em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .product-price {
            font-size: 2em;
            color: #d4af37;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .product-description {
            color: #666;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .product-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .quantity-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.2em;
            border-radius: 5px;
        }

        .quantity-btn:hover {
            background: #e0e0e0;
        }

        #quantity-input {
            width: 60px;
            text-align: center;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .btn-add-cart {
            background: #d4af37;
            color: #1a1a1a;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-add-cart:hover {
            background: #c9a82e;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .product-details-container {
                grid-template-columns: 1fr;
            }

            .product-image-section {
                position: static;
            }

            .product-info-section h1 {
                font-size: 1.8em;
            }

            .product-price {
                font-size: 1.5em;
            }
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #d32f2f;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="../assets/klyra-logo.svg" alt="Klyra Studio Logo" class="brand-logo">
                <div>
                    <h1>KLYRA STUDIO</h1>
                    <p>Luxury Jewelry Collection</p>
                </div>
            </div>
            <button class="menu-toggle" id="menuToggle" type="button" onclick="toggleMobileMenu()" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="../index.html" class="active">Home</a>
                <a href="../index.html#collections">Collections</a>
                <a href="../index.html#about">About</a>
                <a href="../index.html#contact">Contact</a>
                <a href="user-login.html" class="btn-login">Sign In</a>
                <a href="#" class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-bag"></i><span id="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <!-- Product Details -->
    <div class="container">
        <a href="../index.html" class="back-button">← Back to Home</a>
    </div>

    <div class="product-details-container">
        <div class="product-image-section">
            <img id="product-image" src="" alt="Product Image">
        </div>

        <div class="product-info-section">
            <div class="product-collection" id="product-collection"></div>
            <h1 id="product-name"></h1>
            <div class="product-price">₹<span id="product-price"></span></div>
            <div class="product-description" id="product-description"></div>

            <div class="product-quantity">
                <label>Quantity:</label>
                <button class="quantity-btn" onclick="decreaseQuantity()">-</button>
                <input type="number" id="quantity-input" value="1" min="1">
                <button class="quantity-btn" onclick="increaseQuantity()">+</button>
            </div>

            <button class="btn-add-cart" onclick="addProductToCart()">Add to Cart</button>

            <div style="margin-top: 40px; padding-top: 40px; border-top: 1px solid #ddd; color: #666;">
                <h3>Product Details</h3>
                <p><strong>Collection:</strong> <span id="info-collection"></span></p>
                <p><strong>Price:</strong> ₹<span id="info-price"></span></p>
                <p><strong>Available:</strong> In Stock</p>
                <p style="margin-top: 20px; font-size: 0.9em; color: #999;">
                    Free shipping on orders over ₹5000. 
                    <br>Easy returns within 30 days.
                </p>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cart-modal" class="cart-modal" style="display:none;">
        <div class="cart-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <div style="font-weight: bold; font-size: 1.2em;">
                    Total: ₹<span id="cart-total">0</span>
                </div>
                <button class="btn-primary" onclick="proceedToCheckout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/db.js"></script>
    <script src="../js/migrate-storage.js"></script>
    <script>
        let currentProduct = null;
        let cart = [];

        // Wait for db to be defined globally
        async function waitForDB() {
            let attempts = 0;
            while (typeof db === 'undefined' && attempts < 100) {
                await new Promise(resolve => setTimeout(resolve, 50));
                attempts++;
            }
            if (typeof db === 'undefined') {
                console.error('DB failed to load');
                return false;
            }
            try {
                await db.initPromise;
                return true;
            } catch (e) {
                console.error('DB init error:', e);
                return false;
            }
        }

        // Load product details on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const productId = sessionStorage.getItem('viewProductId');
            
            if (!productId) {
                document.querySelector('.product-details-container').innerHTML = 
                    '<div class="error-message">❌ Product not found</div>';
                return;
            }

            // Wait for db
            const dbReady = await waitForDB();
            if (!dbReady) {
                document.querySelector('.product-details-container').innerHTML = 
                    '<div class="error-message">❌ Database connection failed</div>';
                return;
            }

            // Load product
            await loadProductDetails(productId);
            
            // Load cart count
            loadCartFromStorage();
            updateCartCount();
        });

        async function loadProductDetails(productId) {
            try {
                console.log('Loading product:', productId);
                const allProducts = await db.collection('products').get();
                
                let found = false;
                allProducts.forEach(doc => {
                    const data = doc.data();
                    if (doc.id === productId) {
                        currentProduct = { id: doc.id, ...data };
                        displayProductDetails();
                        found = true;
                    }
                });

                if (!found) {
                    document.querySelector('.product-details-container').innerHTML = 
                        '<div class="error-message">❌ Product not found in database</div>';
                }
            } catch (error) {
                console.error('Error loading product:', error);
                document.querySelector('.product-details-container').innerHTML = 
                    '<div class="error-message">❌ Error loading product. Please try again.</div>';
            }
        }

        function displayProductDetails() {
            if (!currentProduct) return;

            document.getElementById('product-image').src = currentProduct.image || 'https://via.placeholder.com/400x500';
            document.getElementById('product-name').textContent = currentProduct.name;
            document.getElementById('product-collection').textContent = currentProduct.collection || 'Collection';
            document.getElementById('product-price').textContent = currentProduct.price;
            document.getElementById('product-description').textContent = currentProduct.description || 'Premium luxury jewelry piece';
            
            document.getElementById('info-collection').textContent = currentProduct.collection || 'Collection';
            document.getElementById('info-price').textContent = currentProduct.price;

            // Update page title
            document.title = currentProduct.name + ' - Klyra Studio';
        }

        function increaseQuantity() {
            const input = document.getElementById('quantity-input');
            input.value = parseInt(input.value) + 1;
        }

        function decreaseQuantity() {
            const input = document.getElementById('quantity-input');
            if (input.value > 1) {
                input.value = parseInt(input.value) - 1;
            }
        }

        function addProductToCart() {
            if (!currentProduct) return;

            const quantity = parseInt(document.getElementById('quantity-input').value);
            
            // Check if already in cart
            const existingItem = cart.find(item => item.id === currentProduct.id);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.price,
                    image: currentProduct.image,
                    quantity: quantity
                });
            }

            saveCartToStorage();
            updateCartCount();
            
            // Show notification
            showNotification('✓ Added ' + quantity + ' item(s) to cart!');
            
            // Reset quantity
            document.getElementById('quantity-input').value = 1;
        }

        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }

        function saveCartToStorage() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            if (modal.style.display === 'none') {
                displayCart();
                modal.style.display = 'block';
            } else {
                modal.style.display = 'none';
            }
        }

        function displayCart() {
            const cartItems = document.getElementById('cart-items');
            let total = 0;

            if (cart.length === 0) {
                cartItems.innerHTML = '<div style="padding: 20px; color: #666;">Your cart is empty</div>';
                document.getElementById('cart-total').textContent = '0';
                return;
            }

            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                        <div>
                            <div style="font-weight: bold;">${item.name}</div>
                            <div style="color: #666; font-size: 0.9em;">₹${item.price} × ${item.quantity}</div>
                        </div>
                        <div style="text-align: right;">
                            <div>₹${itemTotal}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total').textContent = total;
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }

            // Store cart in sessionStorage for checkout page
            sessionStorage.setItem('checkout_data', JSON.stringify({
                items: cart,
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            }));

            window.location.href = 'checkout.html';
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                background: #d4af37;
                color: #1a1a1a;
                padding: 15px 25px;
                border-radius: 5px;
                z-index: 3000;
                animation: slideInRight 0.3s ease;
                font-weight: 600;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Global functions for onclick
        window.toggleCart = toggleCart;
        window.increaseQuantity = increaseQuantity;
        window.decreaseQuantity = decreaseQuantity;
        window.addProductToCart = addProductToCart;
        window.proceedToCheckout = proceedToCheckout;
    </script>
</body>
</html>
