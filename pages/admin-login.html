<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Klyra Studio</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card admin-login">
            <div class="auth-logo">
                <h1>KLYRA STUDIO</h1>
                <p>Admin Portal</p>
            </div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-username">Admin Username</label>
                    <input type="text" id="admin-username" name="username" placeholder="Enter admin username" required>
                    <small>Default: Klyrastudio11</small>
                </div>

                <div class="form-group">
                    <label for="admin-password">Admin Password</label>
                    <input type="password" id="admin-password" name="password" placeholder="Enter admin password" required>
                    <small>Default: Klyrastudio@11</small>
                </div>

                <button type="submit" class="btn-login">Admin Login</button>
            </form>

            <div class="auth-footer">
                <p><a href="../index.html">Back to Home</a></p>
                <p style="margin-top: 20px; font-size: 12px; color: #999;">
                    User? <a href="user-login.html" style="color: #d4af37;">User Login</a>
                </p>
            </div>

            <div class="security-notice">
                <i class="fas fa-shield-alt"></i>
                <p>This is a secure admin area. Keep credentials confidential.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/admin-auth.js"></script>
</body>
</html>
